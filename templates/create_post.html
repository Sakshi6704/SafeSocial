```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Post</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    background:
    radial-gradient(circle at top left,#7c3aed22,transparent 25%),
    radial-gradient(circle at bottom right,#2563eb22,transparent 25%),
    linear-gradient(135deg,#020617,#08142e,#0f172a);

    color:white;
}

/* NAVBAR */

.navbar{

    position:fixed;
    top:0;
    left:0;
    width:100%;

    padding:20px 40px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(0,0,0,.3);
    backdrop-filter:blur(15px);

    border-bottom:1px solid rgba(255,255,255,.08);

    z-index:999;
}

.logo{

    font-size:28px;
    font-weight:bold;
}

.menu a{

    color:white;
    text-decoration:none;

    margin-left:25px;
    transition:.3s;
}

.menu a:hover{

    color:#60a5fa;
}

.feed-btn{

    background:linear-gradient(
    90deg,
    #3b82f6,
    #9333ea
    );

    padding:12px 20px;
    border-radius:12px;
}

/* CONTAINER */

.container{

    max-width:1100px;

    margin:130px auto;

    padding:20px;
}

/* CARD */

.card{

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:40px;

    box-shadow:
    0 0 25px rgba(124,58,237,.25),
    0 0 60px rgba(37,99,235,.15);

    animation:fadeIn 1s ease;
}

.header{

    display:flex;
    align-items:center;
    gap:20px;

    margin-bottom:30px;
}

.icon{

    width:80px;
    height:80px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(
    135deg,
    #6366f1,
    #9333ea
    );

    font-size:35px;
}

h1{

    margin-bottom:10px;
}

.subtitle{

    color:#94a3b8;
}

/* FORM */

label{

    display:block;
    margin-bottom:10px;

    font-size:20px;
    font-weight:600;
}

textarea{

    width:100%;
    height:220px;

    background:#0f172a;
    color:white;

    border:1px solid #334155;

    border-radius:15px;

    padding:20px;

    font-size:16px;

    resize:none;
}

textarea:focus{

    outline:none;

    border-color:#7c3aed;
}

/* FILE */

.file-box{

    margin-top:30px;
}

input[type=file]{

    width:100%;

    padding:15px;

    border-radius:15px;

    background:#0f172a;

    color:white;

    border:1px solid #7c3aed;
}

/* PREVIEW */

#preview{

    display:none;

    margin-top:20px;

    width:300px;

    border-radius:15px;

    border:2px solid #7c3aed;
}

/* BUTTONS */

.buttons{

    display:flex;
    gap:15px;

    margin-top:30px;
}

button{

    border:none;

    padding:14px 30px;

    border-radius:12px;

    cursor:pointer;

    font-size:16px;

    font-weight:bold;

    transition:.3s;
}

.upload-btn{

    background:linear-gradient(
    90deg,
    #3b82f6,
    #9333ea
    );

    color:white;
}

.upload-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 0 25px #9333ea;
}

.clear-btn{

    background:#ef4444;
    color:white;
}

.clear-btn:hover{

    transform:translateY(-3px);
}

/* ANIMATION */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<nav class="navbar">

    <div class="logo">
        🛡 SafeSocial AI
    </div>

    <div class="menu">

        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/detect">Detect</a>
        <a href="/history">History</a>

        <a href="/feed" class="feed-btn">
            Feed Page
        </a>

        <a href="/logout">Logout</a>

    </div>

</nav>

<div class="container">

    <div class="card">

        <div class="header">

            <div class="icon">
                ✏️
            </div>

            <div>

                <h1>Create Post</h1>

                <div class="subtitle">
                    Share your thoughts, ideas or updates with the community.
                </div>

            </div>

        </div>

        <form method="POST"
              enctype="multipart/form-data">

            <label>
                Post Content
            </label>

            <textarea
            name="text"
            placeholder="Write something amazing..."></textarea>

            <div class="file-box">

                <label>
                    Add Image (Optional)
                </label>

                <input
                type="file"
                name="image"
                id="imageInput"
                accept="image/*">

            </div>

            <img id="preview">

            <div class="buttons">

                <button
                type="submit"
                class="upload-btn">
                    🚀 Upload Post
                </button>

                <button
                type="reset"
                class="clear-btn">
                    🗑 Clear
                </button>

            </div>

        </form>

    </div>

</div>

<script>

document
.getElementById("imageInput")
.addEventListener("change",function(){

    let file=this.files[0];

    if(file){

        let preview=
        document.getElementById("preview");

        preview.src=
        URL.createObjectURL(file);

        preview.style.display="block";
    }

});

</script>

</body>
</html>
