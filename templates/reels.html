<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeSocial Reels</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    font-family:Arial,sans-serif;
    min-height:100vh;
    overflow:hidden;
}

/* Animated Background */

body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:rgba(56,189,248,.15);
    border-radius:50%;
    top:-200px;
    left:-150px;
    filter:blur(100px);
    animation:float1 8s infinite alternate;
}

body::after{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    background:rgba(168,85,247,.15);
    border-radius:50%;
    bottom:-150px;
    right:-150px;
    filter:blur(100px);
    animation:float2 8s infinite alternate;
}

@keyframes float1{
    from{transform:translateY(0);}
    to{transform:translateY(80px);}
}

@keyframes float2{
    from{transform:translateY(0);}
    to{transform:translateY(-80px);}
}

/* Header */

.header{
    position:fixed;
    top:0;
    width:100%;
    height:75px;
    background:rgba(17,24,39,.85);
    backdrop-filter:blur(15px);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    z-index:1000;
    border-bottom:1px solid #1e293b;
}

.logo{
    background:linear-gradient(90deg,#38bdf8,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* Add Button */

.add-btn{
    position:fixed;
    top:15px;
    right:20px;

    width:60px;
    height:60px;

    border-radius:50%;

    background:linear-gradient(
        135deg,
        #38bdf8,
        #8b5cf6
    );

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
    font-size:28px;
    text-decoration:none;

    box-shadow:0 0 25px rgba(56,189,248,.5);

    z-index:2000;

    transition:.3s;
}

.add-btn:hover{
    transform:scale(1.1) rotate(90deg);
}

/* Back Button */

.back-btn{
    position:fixed;
    top:18px;
    left:20px;

    padding:12px 18px;

    border-radius:12px;

    background:#ef4444;

    color:white;

    text-decoration:none;

    font-weight:bold;

    z-index:2000;

    transition:.3s;
}

.back-btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(239,68,68,.5);
}

/* Center */

.center-box{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    text-align:center;

    animation:fadeUp .8s ease;
}

.reel-icon{

    font-size:120px;

    color:#38bdf8;

    margin-bottom:20px;

    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-15px);
    }
}

.title{

    font-size:45px;

    font-weight:bold;

    margin-bottom:10px;
}

.subtitle{

    color:#94a3b8;

    font-size:18px;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<a href="/feed" class="back-btn">
    ⬅ Back
</a>

<a href="/create_reel" class="add-btn">
    <i class="fa-solid fa-plus"></i>
</a>

<div class="header">
    <div class="logo">
        🎬 SafeSocial Reels
    </div>
</div>

<div class="center-box">

    <i class="fa-solid fa-film reel-icon"></i>

    <div class="title">
        Reels Coming Soon
    </div>

    <div class="subtitle">
        Create and share short videos with the SafeSocial community.
    </div>

</div>

</body>
</html>
